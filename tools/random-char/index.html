<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机字符生成器</title>
  <script src="../../assets/vendor/opentype.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 24px;
    }
    .panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .controls {
      width: 320px;
      flex-shrink: 0;
    }
    .preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 14px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }

    .back-btn:hover { background: #e8e8e8; color: #333; }

    .group {
      margin-bottom: 18px;
    }
    .group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #007AFF;
      background: #f0f7ff;
    }
    .upload-area input { display: none; }
    .upload-area .icon { font-size: 28px; }
    .upload-area .text { font-size: 12px; color: #666; margin-top: 6px; }
    .upload-area .loaded { font-size: 12px; color: #28a745; margin-top: 6px; font-weight: 600; }
    .hidden { display: none; }
    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      resize: vertical;
      font-family: monospace;
    }
    .row2 {
      display: flex;
      gap: 10px;
    }
    .row2 input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .range-row input[type="range"] {
      flex: 1;
    }
    .range-row span {
      font-size: 12px;
      color: #888;
      min-width: 50px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary { background: #007AFF; color: white; }
    .btn-primary:hover { background: #0056CC; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    canvas {
      border: 1px solid #ddd;
      border-radius: 4px;
      max-width: 100%;
    }
    .info {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
    .stats {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- 左侧控制面板 -->
  <div class="panel controls">
    <h2>🎲 随机字符生成器</h2>
    <a class="back-btn" href="../../index.html">← 返回工具箱</a>

    <div class="group">
      <label>上传 TTF / OTF 字体</label>
      <div class="upload-area" id="uploadArea">
        <div class="icon">🔤</div>
        <div class="text">点击或拖拽上传 TTF / OTF 文件</div>
        <div class="loaded hidden" id="loadedName"></div>
        <input type="file" id="fontFile" accept=".ttf,.otf,font/ttf,font/otf,application/font-sfnt">
      </div>
    </div>

    <div class="group">
      <label>输入字符（空格分隔或连续输入）</label>
      <textarea id="charInput" placeholder="例如：ABCDEFGHIJKLMNOPQRSTUVWXYZ&#10;或：你好世界 测试文字">AÆBCDÐEFGHĦIJKLŁMNOØŒPÞQRSẞTUVWXYZaæbcdđðefghħijklłmnoøœpqrsßtuvwxyzΩπ0123456789.,!?*#※(){}</textarea>
    </div>

    <div class="group">
      <label>字号范围 (px)</label>
      <div class="row2">
        <input type="number" id="minSize" value="80" min="10" max="500">
        <input type="number" id="maxSize" value="140" min="10" max="500">
      </div>
    </div>

    <div class="group">
      <label>最小间距</label>
      <div class="range-row">
        <input type="range" id="padding" value="10" min="0" max="50">
        <span id="paddingVal">10px</span>
      </div>
    </div>

    <div class="group">
      <label>最大尝试次数</label>
      <input type="number" id="maxAttempts" value="100" min="10" max="1000">
      <div style="font-size: 11px; color: #999; margin-top: 4px;">防止无限循环，字符过多时调大</div>
    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generate()" disabled>
      🎨 生成图片
    </button>
    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadImage()" disabled>
      💾 下载 PNG
    </button>

    <div class="stats hidden" id="stats"></div>
  </div>

  <!-- 右侧预览 -->
  <div class="panel preview">
    <h2>预览 (1000×1000)</h2>
    <canvas id="canvas" width="1000" height="1000"></canvas>
    <div class="info">白底黑字，字符随机分布不重叠</div>
  </div>
</div>

<script>
  const uploadArea = document.getElementById('uploadArea');
  const fontFile = document.getElementById('fontFile');
  const loadedName = document.getElementById('loadedName');
  const charInput = document.getElementById('charInput');
  const minSizeInput = document.getElementById('minSize');
  const maxSizeInput = document.getElementById('maxSize');
  const paddingSlider = document.getElementById('padding');
  const paddingVal = document.getElementById('paddingVal');
  const maxAttemptsInput = document.getElementById('maxAttempts');
  const generateBtn = document.getElementById('generateBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const stats = document.getElementById('stats');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let font = null;
  let fontFileName = '';
  let placedRects = [];

  // 上传区域
  uploadArea.addEventListener('click', () => fontFile.click());
  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (isSupportedFontFile(f)) {
      loadFont(f);
    } else {
      alert('请上传 TTF 或 OTF 字体文件');
    }
  });
  fontFile.addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    if (isSupportedFontFile(f)) {
      loadFont(f);
    } else {
      alert('请上传 TTF 或 OTF 字体文件');
      fontFile.value = '';
    }
  });

  // 间距滑块
  paddingSlider.addEventListener('input', () => {
    paddingVal.textContent = paddingSlider.value + 'px';
  });

  function isSupportedFontFile(file) {
    return /\.(ttf|otf)$/i.test(file.name);
  }

  function readSfntSignature(buffer) {
    const bytes = new Uint8Array(buffer, 0, Math.min(4, buffer.byteLength));
    return Array.from(bytes).map(byte => String.fromCharCode(byte)).join('');
  }

  function getFontFormat(buffer, fileName) {
    const signature = readSfntSignature(buffer);
    if (signature === 'OTTO') return 'OTF';
    if (signature === 'true') return 'TTF';

    if (buffer.byteLength >= 4) {
      const version = new DataView(buffer).getUint32(0, false);
      if (version === 0x00010000) return 'TTF';
    }

    const fallback = fileName.match(/\.([^.]+)$/);
    return fallback ? fallback[1].toUpperCase() : '字体';
  }

  function getGlyphDrawBounds(glyph, fontSize) {
    const scale = fontSize / font.unitsPerEm;
    const fallbackAdvance = (glyph.advanceWidth || font.unitsPerEm * 0.5) * scale;
    const fallbackAscender = (font.ascender || font.unitsPerEm * 0.8) * scale;
    const fallbackDescender = (font.descender || -font.unitsPerEm * 0.2) * scale;

    try {
      const box = glyph.getBoundingBox();
      const hasDrawableBox = box &&
        Number.isFinite(box.x1) && Number.isFinite(box.y1) &&
        Number.isFinite(box.x2) && Number.isFinite(box.y2) &&
        (box.x1 !== box.x2 || box.y1 !== box.y2);

      if (hasDrawableBox) {
        return {
          left: box.x1 * scale,
          right: box.x2 * scale,
          top: -box.y2 * scale,
          bottom: -box.y1 * scale
        };
      }
    } catch (err) {
      // 部分字体的异常字形没有完整边界，退回到字体度量估算。
    }

    return {
      left: 0,
      right: fallbackAdvance,
      top: -fallbackAscender,
      bottom: -fallbackDescender
    };
  }

  function getRandomBetween(min, max) {
    return Math.random() * (max - min) + min;
  }

  // 加载字体
  function loadFont(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const buffer = e.target.result;
        const fontFormat = getFontFormat(buffer, file.name);
        font = opentype.parse(buffer);
        fontFileName = file.name.replace(/\.[^.]+$/, ''); // 去掉扩展名
        loadedName.textContent = `✓ ${file.name} (${fontFormat})`;
        loadedName.classList.remove('hidden');
        generateBtn.disabled = false;
        stats.textContent = `字体已加载，格式 ${fontFormat}，包含 ${font.numGlyphs} 个字形`;
        stats.classList.remove('hidden');
      } catch (err) {
        font = null;
        fontFileName = '';
        loadedName.classList.add('hidden');
        generateBtn.disabled = true;
        alert('字体加载失败，请确认文件是有效的 TTF 或 OTF 字体: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // 检查两个矩形是否重叠（含间距）
  function isOverlapping(r1, r2, padding) {
    return !(r1.x + r1.w + padding < r2.x ||
             r2.x + r2.w + padding < r1.x ||
             r1.y + r1.h + padding < r2.y ||
             r2.y + r2.h + padding < r1.y);
  }

  // 检查矩形是否与已放置的任一矩形重叠
  function checkCollision(rect, padding) {
    for (const r of placedRects) {
      if (isOverlapping(rect, r, padding)) return true;
    }
    return false;
  }

  // 生成图片
  function generate() {
    if (!font) return;

    const chars = charInput.value.trim().replace(/\s+/g, '');
    if (!chars) {
      alert('请输入字符');
      return;
    }

    const minSize = parseInt(minSizeInput.value) || 40;
    const maxSize = parseInt(maxSizeInput.value) || 120;
    const padding = parseInt(paddingSlider.value) || 0;
    const maxAttempts = parseInt(maxAttemptsInput.value) || 100;

    // 清空画布（白底）
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, 0, 1000, 1000);

    placedRects = [];
    let placedCount = 0;
    let skippedCount = 0;
    const missingChars = [];

    // 随机打乱字符顺序
    const charArray = Array.from(chars).sort(() => Math.random() - 0.5);

    for (const char of charArray) {
      // 检查字体是否包含该字符
      const glyph = font.charToGlyph(char);
      if (!glyph || glyph.index === 0) {
        skippedCount++;
        missingChars.push(char);
        continue;
      }

      // 尝试放置
      let placed = false;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const fontSize = Math.floor(Math.random() * (maxSize - minSize + 1)) + minSize;
        
        const bounds = getGlyphDrawBounds(glyph, fontSize);
        const width = Math.max(bounds.right - bounds.left, 1);
        const height = Math.max(bounds.bottom - bounds.top, 1);
        const minX = Math.max(0, -bounds.left);
        const maxX = Math.min(1000, 1000 - bounds.right);
        const minY = Math.max(0, -bounds.top);
        const maxY = Math.min(1000, 1000 - bounds.bottom);

        if (maxX <= minX || maxY <= minY) continue;

        // 随机位置（确保不超出边界）
        const x = getRandomBetween(minX, maxX);
        const y = getRandomBetween(minY, maxY);

        const rect = {
          x: x + bounds.left,
          y: y + bounds.top,
          w: width,
          h: height
        };

        // 检查碰撞
        if (!checkCollision(rect, padding)) {
          // 绘制字符
          ctx.fillStyle = '#000000';
          ctx.font = `${fontSize}px "${font.names.fullName?.en || 'Custom'}"`;
          
          // 使用 opentype.js 绘制路径以获得更精确的控制
          const path = glyph.getPath(x, y, fontSize);
          path.draw(ctx);

          placedRects.push(rect);
          placedCount++;
          placed = true;
          break;
        }
      }

      if (!placed) {
        skippedCount++;
      }
    }

    // 更新统计
    stats.innerHTML = `
      <strong>生成结果：</strong><br>
      成功放置: ${placedCount} 个<br>
      跳过/失败: ${skippedCount} 个<br>
      ${missingChars.length > 0 ? `字体缺失: ${missingChars.join(', ')}` : ''}
    `;
    stats.classList.remove('hidden');
    downloadBtn.disabled = false;
  }

  // 下载图片
  function downloadImage() {
    const link = document.createElement('a');
    const filename = fontFileName ? `${fontFileName}.png` : `random-chars.png`;
    link.download = filename;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>
