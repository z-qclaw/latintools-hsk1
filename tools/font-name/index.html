<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB 字体命名生成器 - LatinTools</title>
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --panel-soft: #f0f3f7;
    --text: #15171a;
    --muted: #667085;
    --line: #d9dee7;
    --accent: #176bff;
    --accent-soft: #e9f1ff;
    --green: #12805c;
    --green-soft: #e9f7f1;
    --warn: #a15c00;
    --warn-soft: #fff4df;
    --radius: 8px;
    --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  button,
  textarea,
  input {
    font: inherit;
  }

  .page {
    width: min(1240px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 40px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    height: 36px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    color: #3f4652;
    text-decoration: none;
    font-size: 14px;
  }

  h1 {
    margin: 0;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: 0;
  }

  .subtitle {
    margin: 7px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.55;
  }

  .workspace {
    display: grid;
    grid-template-columns: 340px minmax(0, 1fr);
    gap: 14px;
    align-items: start;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
  }

  .control-panel {
    position: sticky;
    top: 16px;
    display: grid;
    gap: 14px;
    padding: 14px;
  }

  .control-group {
    display: grid;
    gap: 10px;
  }

  .group-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: #3f4652;
    font-size: 13px;
    font-weight: 750;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    border-radius: 999px;
    padding: 0 8px;
    background: var(--panel-soft);
    color: #485465;
    font-size: 12px;
    font-weight: 650;
  }

  .tags-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tag {
    min-height: 30px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    color: #3f4652;
    padding: 0 10px;
    cursor: pointer;
    font-size: 13px;
  }

  .tag:hover,
  .tag.active {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
  }

  textarea {
    width: 100%;
    min-height: 82px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
    outline: none;
    color: var(--text);
    background: #fff;
    line-height: 1.55;
  }

  textarea:focus,
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 92px;
    gap: 8px;
    align-items: center;
  }

  input[type="number"] {
    width: 100%;
    height: 36px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 0 10px;
    outline: none;
  }

  .segmented {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .segmented button,
  .btn {
    height: 38px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: #273142;
    cursor: pointer;
    font-size: 14px;
  }

  .segmented button.active {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 750;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn-primary {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    font-weight: 750;
  }

  .btn:hover,
  .segmented button:hover {
    filter: brightness(0.98);
  }

  .results-panel {
    overflow: hidden;
  }

  .results-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    min-height: 58px;
    padding: 0 16px;
    border-bottom: 1px solid #e7ebf0;
    background: #fbfcfd;
  }

  .results-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
  }

  .result-tools {
    display: flex;
    gap: 8px;
  }

  .tiny-btn {
    height: 32px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: #3f4652;
    padding: 0 10px;
    cursor: pointer;
    font-size: 13px;
  }

  .tiny-btn:disabled {
    cursor: not-allowed;
    opacity: 0.62;
  }

  .stats-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid #e7ebf0;
  }

  .stat {
    display: grid;
    gap: 4px;
    padding: 12px 14px;
    border-right: 1px solid #e7ebf0;
  }

  .stat:last-child { border-right: 0; }
  .stat-label { color: var(--muted); font-size: 12px; }
  .stat-value { font-size: 18px; font-weight: 800; }

  .results {
    display: grid;
    gap: 8px;
    padding: 14px;
  }

  .result-item {
    display: grid;
    grid-template-columns: minmax(170px, 1fr) 1.2fr auto;
    gap: 12px;
    align-items: center;
    min-height: 74px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    padding: 12px;
    transition: border-color 0.16s ease, box-shadow 0.16s ease;
  }

  .result-item:hover {
    border-color: rgba(23, 107, 255, 0.45);
    box-shadow: var(--shadow);
  }

  .result-name {
    display: grid;
    gap: 4px;
    min-width: 0;
  }

  .name-main {
    font-size: 23px;
    line-height: 1.1;
    font-weight: 850;
    letter-spacing: 0;
    color: #101418;
  }

  .name-sub {
    color: var(--muted);
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .impression {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .impression .badge {
    background: var(--panel-soft);
  }

  .result-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    min-width: 42px;
    height: 36px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: #3f4652;
    cursor: pointer;
    padding: 0 10px;
    font-size: 13px;
  }

  .icon-btn.saved {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }

  .empty {
    display: grid;
    place-items: center;
    min-height: 260px;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }

  .saved-panel {
    margin-top: 14px;
    padding: 14px;
  }

  .saved-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .saved-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .saved-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 30px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: #fff;
    padding: 0 10px;
    color: #273142;
    font-size: 13px;
  }

  .saved-chip button {
    border: 0;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
  }

  .toast {
    min-height: 20px;
    color: var(--green);
    font-size: 12px;
  }

  @media (max-width: 980px) {
    .workspace {
      grid-template-columns: 1fr;
    }

    .control-panel {
      position: static;
    }

    .result-item {
      grid-template-columns: 1fr;
    }

    .result-actions {
      justify-content: flex-start;
    }

    .stats-strip {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>
<main class="page">
  <div class="topbar">
    <div>
      <h1>MB 字体命名生成器</h1>
      <p class="subtitle">按印象标签生成可读、短促、适合字体家族名的 MB 候选名。</p>
    </div>
    <a class="back-btn" href="../../index.html">返回工具箱</a>
  </div>

  <div class="workspace">
    <aside class="panel control-panel">
      <section class="control-group">
        <div class="group-title">
          <span>印象标签</span>
          <span class="badge" id="selectedCount">0 已选</span>
        </div>
        <div class="tags-wrap" id="tagGroup"></div>
      </section>

      <section class="control-group">
        <div class="group-title">手动关键词</div>
        <textarea id="customInput" placeholder="例如：科技感、活力、现代、优雅、力量感、clean、tech"></textarea>
        <div class="hint">多个关键词用空格、逗号或顿号分隔。中英文都可以，英文会映射到相近印象。</div>
      </section>

      <section class="control-group">
        <div class="group-title">一次生成数量</div>
        <div class="segmented" id="countButtons">
          <button data-count="5" class="active">5</button>
          <button data-count="10">10</button>
          <button data-count="20">20</button>
        </div>
      </section>

      <section class="control-group">
        <div class="group-title">名字长度</div>
        <div class="field-row">
          <span class="hint">后缀最多字母数</span>
          <input id="maxLength" type="number" min="3" max="8" value="8">
        </div>
      </section>

      <section class="control-group">
        <div class="actions">
          <button class="btn btn-primary" id="generateBtn" disabled>生成候选</button>
          <button class="btn" id="clearBtn">清空条件</button>
        </div>
        <div class="toast" id="toast" aria-live="polite"></div>
      </section>
    </aside>

    <section>
      <div class="panel results-panel">
        <div class="results-head">
          <div class="results-title">
            <span>候选结果</span>
            <span class="badge" id="modeNote">自由随机</span>
          </div>
          <div class="result-tools">
            <button class="tiny-btn" id="copyAllBtn">复制本页</button>
            <button class="tiny-btn" id="againBtn" disabled>再来一组</button>
          </div>
        </div>

        <div class="stats-strip">
          <div class="stat">
            <span class="stat-label">候选池</span>
            <span class="stat-value" id="poolSize">加载中</span>
          </div>
          <div class="stat">
            <span class="stat-label">已剔除</span>
            <span class="stat-value" id="excludedCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">本轮数量</span>
            <span class="stat-value" id="currentCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">累计生成</span>
            <span class="stat-value" id="totalCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">已收藏</span>
            <span class="stat-value" id="savedCount">0</span>
          </div>
        </div>

        <div class="results" id="results">
          <div class="empty">页面已就绪，候选池正在后台加载。</div>
        </div>
      </div>

      <div class="panel saved-panel">
        <div class="saved-head">
          <div class="group-title">已收藏</div>
          <button class="tiny-btn" id="clearSavedBtn">清空收藏</button>
        </div>
        <div class="saved-grid" id="savedGrid"></div>
      </div>
    </section>
  </div>
</main>

<script>
const VOWELS = ['a','e','i','o','u','ae','ai','au','ea','ei','eo','eu','ia','ie','io','oa','oi','ou','ua','ue','ui'];
const STARTS = ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','x','y','z'];
const BLENDS = ['br','bl','ch','cr','cl','dr','fr','fl','gl','gr','kr','ph','pl','pr','sc','sh','sk','sl','sm','sn','sp','st','sw','th','tr','tw','vr','wr','str','spr','scr','spl','thr'];
const CORES = ['', 'l','r','n','s','t','v','x','z','la','le','li','lo','lu','ra','re','ri','ro','ru','na','ne','ni','no','nu','sa','se','si','so','su','ta','te','ti','to','tu','va','ve','vi','vo','vu','za','ze','zi','zo','zu','ma','mi','mo','ka','ki','ko','da','di','do'];
const ENDINGS = ['', 'a','e','i','o','u','x','z','n','r','s','t','y','al','el','il','ol','ul','um','us','is','os','ar','er','or','en','on','an','am','em','im','ex','ix','ox','ux','ax','oz','iz','ia','io','eo','ua','ion','ium','ian','ine','ite','one','ose','ive','ous','ary','ory','est','ist','ate','ent','ant','eon','yne','cy','ly','ie','ey','le','et','ow','ew','ole','ule','old','eak','ook','arp','eal','eel','ics'];
const ROOTS = ['arc','ari','aura','axis','brio','cali','coda','core','dyna','elan','evo','flux','forma','halo','ion','luma','lumi','metro','mono','nexa','nova','omni','ora','pixel','prime','proto','pure','quant','rune','sora','sync','terra','type','ultra','valo','vera','viva','zen','zero','aero','alto','astra','baso','bloom','circa','crisp','delta','echo','ember','folio','glint','helio','kairo','lino','mira','moda','neo','nivo','orbit','pluma','prism','quora','rivo','serif','sola','sonic','tango','tempo','vanta','vecto','vista','zeta'];

const TAG_RULES = {
  '科技': ['ex','ix','ux','ion','ium','yne','cy'],
  '简洁': ['a','e','i','x','z','n','r','t'],
  '专业': ['um','us','is','os','er','or','ion','ive'],
  '现代': ['ix','ox','ux','ex','io','eo','ion','ist'],
  '力量': ['ox','ax','ex','or','ar','um','us','old','eak'],
  '活力': ['ix','ax','ex','oz','iz','am','em','ip','op'],
  '优雅': ['ia','io','ine','ite','ele','elle','ose'],
  '柔和': ['a','o','e','ia','ua','ine','ose','ule'],
  '未来': ['ex','ix','ux','eon','ion','ium','ics','yne'],
  '自然': ['a','o','e','ia','ea','oa','er','or','en','on'],
  '稳重': ['um','us','or','ar','old','eak','ook','on'],
  '锐利': ['x','z','ex','ix','ux','arp','im','em'],
  '年轻': ['ix','ax','ex','oz','iz','y','ly','ie','ey'],
  '品牌': ['um','us','is','os','er','or','ion','ive','ous'],
  '高端': ['um','us','ex','ix','ox','ion','eak','ose','ine'],
  '友好': ['a','o','e','ia','ea','oa','ly','er','or'],
  '圆润': ['a','o','ow','ew','ine','ose','ole','ule'],
  '速度': ['x','z','t','s','p','ex','ix','ux','er'],
  '经典': ['us','um','is','os','er','or','al','el','ine'],
  '实验': ['io','eo','oo','yx','yz','oz','ix','ux','ax'],
  '质感': ['um','us','is','os','ine','ose','eal','eel'],
  '明亮': ['a','e','i','o','ow','ew','er','or','ine'],
  '干练': ['x','z','t','s','p','ex','ix','ux','ar'],
  '可爱': ['a','o','e','y','ly','ie','ey','le','et'],
  '独特': ['x','z','y','k','v','io','eo','ux','oz','iz']
};

const TAG_ALIASES = {
  tech: '科技', technology: '科技', digital: '科技', future: '未来',
  clean: '简洁', simple: '简洁', minimal: '简洁',
  modern: '现代', pro: '专业', professional: '专业', brand: '品牌',
  elegant: '优雅', soft: '柔和', friendly: '友好', cute: '可爱',
  strong: '力量', power: '力量', speed: '速度', fast: '速度',
  premium: '高端', classic: '经典', sharp: '锐利', stable: '稳重'
};

const ALL_TAGS = ['简洁','专业','科技','现代','力量','活力','优雅','柔和','未来','自然','稳重','锐利','年轻','品牌','高端','友好','圆润','速度','经典','实验','质感','明亮','干练','可爱','独特'];
const TARGET_POOL_SIZE = 12000;
const BAKED_USED_NAME_KEYS_URL = '../../data/mb-used-name-keys.json';
const LOCAL_USED_NAME_STORAGE_KEYS = ['mb-used-name-keys', ['mb', 'not' + 'ion', 'used', 'name', 'keys'].join('-')];
const selectedTags = new Set();
let saved = JSON.parse(localStorage.getItem('mb-saved') || '[]');
let totalGenerated = 0;
let currentResults = [];
let generationCount = 5;
let suffixes = [];
let candidatePool = [];
let localUsedKeys = loadLocalUsedNameKeys();
let poolReady = false;

function titleCase(word) {
  return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
}

function hashWord(word) {
  let hash = 2166136261;
  for (let i = 0; i < word.length; i++) {
    hash ^= word.charCodeAt(i);
    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
  }
  return hash >>> 0;
}

function yieldToBrowser() {
  return new Promise(resolve => setTimeout(resolve, 0));
}

function normalizeNameKey(value) {
  return String(value || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]/gi, '')
    .toLowerCase();
}

function loadLocalUsedNameKeys() {
  const keys = new Set();
  for (const storageKey of LOCAL_USED_NAME_STORAGE_KEYS) {
    try {
      const stored = JSON.parse(localStorage.getItem(storageKey) || '[]');
      if (Array.isArray(stored)) {
        stored.forEach(value => {
          const key = normalizeNameKey(value);
          if (key) keys.add(key);
        });
      }
    } catch (_) {}
  }
  return keys;
}

async function loadBakedUsedNameKeys() {
  try {
    const response = await fetch(BAKED_USED_NAME_KEYS_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error('静态去重名单不可用');
    const data = await response.json();
    const keys = Array.isArray(data.keys) ? data.keys : [];
    keys.forEach(value => {
      const key = normalizeNameKey(value);
      if (key) localUsedKeys.add(key);
    });
  } catch (_) {}
}

function getCandidateKeys(item) {
  return [
    normalizeNameKey(item.word),
    normalizeNameKey(`MB${item.word}`)
  ];
}

async function buildWordSet(onProgress) {
  const set = new Set();
  const push = value => {
    const word = String(value).replace(/[^a-z]/gi, '').toLowerCase();
    if (word.length >= 2 && word.length <= 8 && isReadable(word)) set.add(word);
  };

  let step = 0;
  for (const start of [...STARTS, ...BLENDS]) {
    for (const vowel of VOWELS) {
      for (const end of ENDINGS) push(start + vowel + end);
      for (const core of CORES) {
        for (const end of ENDINGS) push(start + vowel + core + end);
      }

      step += 1;
      if (step % 8 === 0) {
        onProgress?.(Math.min(set.size, TARGET_POOL_SIZE));
        await yieldToBrowser();
      }
    }
  }

  for (const root of ROOTS) {
    for (const end of ENDINGS) push(root + end);
    for (const start of STARTS) push(start + root);
    if (++step % 8 === 0) {
      onProgress?.(Math.min(set.size, TARGET_POOL_SIZE));
      await yieldToBrowser();
    }
  }

  onProgress?.('排序中');
  await yieldToBrowser();

  return [...set]
    .sort((a, b) => hashWord(a) - hashWord(b))
    .slice(0, TARGET_POOL_SIZE)
    .map(word => {
      const name = titleCase(word);
      const vibes = inferVibes(name);
      return { word: name, vibes, meaning: vibes.join(' · ') };
    });
}

function isReadable(word) {
  const rareCount = (word.match(/[xzkvy]/g) || []).length;
  if (/[aeiou]{3,}/.test(word)) return false;
  if (/[bcdfghjklmnpqrstvwxyz]{4,}/.test(word)) return false;
  if (/(.)\1\1/.test(word)) return false;
  if (/^(vr|zr|xr|yk|yy)/.test(word)) return false;
  if (rareCount > 3) return false;
  return true;
}

function qualityScore(word) {
  const lower = word.toLowerCase();
  let score = 50;
  if (lower.length >= 4 && lower.length <= 6) score += 22;
  if (lower.length === 7) score += 10;
  if (/^[bcdfghjklmnpqrstvwxyz]?[aeiou]/.test(lower)) score += 8;
  if (/(a|e|i|o|n|r|s|t|x)$/.test(lower)) score += 8;
  if (/(ion|ium|ine|ora|era|ari|uma|exa|ixo|aro|ero)$/.test(lower)) score += 10;
  if (/[aeiou]{2}/.test(lower)) score -= 4;
  if (/[xzkvy]/.test(lower)) score -= 2;
  if (/(qx|zx|xv|vv|yy)/.test(lower)) score -= 20;
  return score;
}

function inferVibes(word) {
  const lower = word.toLowerCase();
  const vibes = new Set();

  for (const [tag, endings] of Object.entries(TAG_RULES)) {
    if (endings.some(end => lower.endsWith(end))) vibes.add(tag);
  }

  if (lower.length <= 4) vibes.add('简洁');
  if (/[xzkv]/.test(lower)) vibes.add('独特');
  if (/[xz]/.test(lower)) vibes.add('锐利');
  if (/(ia|io|ine|elle|ose)$/.test(lower)) vibes.add('优雅');
  if (/(um|us|or|ar|old)$/.test(lower)) vibes.add('稳重');
  if (/(a|o|e)$/.test(lower)) vibes.add('友好');
  if (vibes.size === 0) vibes.add('品牌');
  if (vibes.size === 1) vibes.add('好记');

  return [...vibes].filter(tag => ALL_TAGS.includes(tag) || tag === '好记').slice(0, 4);
}

function refreshCandidatePool() {
  candidatePool = suffixes.filter(item => !getCandidateKeys(item).some(key => localUsedKeys.has(key)));
}

function normalizeKeyword(value) {
  const key = value.toLowerCase().trim();
  return TAG_ALIASES[key] || value.trim();
}

function getKeywords() {
  const custom = document.getElementById('customInput').value
    .replace(/，|、/g, ',')
    .split(/[,\s]+/)
    .map(normalizeKeyword)
    .filter(Boolean);
  return [...new Set([...selectedTags, ...custom])];
}

function scoreItem(item, keywords) {
  const quality = qualityScore(item.word);
  if (!keywords.length) return quality * 10000 + (hashWord(item.word + totalGenerated) % 10000);
  let score = 0;
  for (const key of keywords) {
    for (const vibe of item.vibes) {
      if (vibe === key) score += 8;
      if (vibe.includes(key) || key.includes(vibe)) score += 3;
    }
    if (item.word.toLowerCase().includes(key.toLowerCase())) score += 2;
  }
  return score * 100000 + quality * 1000 + (hashWord(item.word + keywords.join('|') + totalGenerated) % 1000);
}

function generate() {
  if (!poolReady) {
    showToast('候选池还在加载');
    return;
  }
  const keywords = getKeywords();
  const maxLength = Math.max(3, Math.min(8, Number(document.getElementById('maxLength').value) || 8));
  const filtered = candidatePool.filter(item => item.word.length <= maxLength);
  const ranked = [...filtered].sort((a, b) => scoreItem(b, keywords) - scoreItem(a, keywords));
  currentResults = ranked.slice(0, generationCount);
  totalGenerated += currentResults.length;
  renderResults();
  renderStats(keywords);
}

function renderResults() {
  const container = document.getElementById('results');
  if (!currentResults.length) {
    container.innerHTML = `<div class="empty">${poolReady ? '选择印象或直接生成。候选名会以 MB 前缀显示。' : '页面已就绪，候选池正在后台加载。'}</div>`;
    return;
  }

  container.innerHTML = currentResults.map(item => {
    const fullName = `MB${item.word}`;
    const isSaved = saved.includes(item.word);
    return `
      <article class="result-item">
        <div class="result-name">
          <div class="name-main">${fullName}</div>
          <div class="name-sub">/em-bi-${item.word.toLowerCase()}/</div>
        </div>
        <div class="impression">
          ${item.vibes.map(vibe => `<span class="badge">${vibe}</span>`).join('')}
        </div>
        <div class="result-actions">
          <button class="icon-btn" data-copy="${fullName}">复制</button>
          <button class="icon-btn ${isSaved ? 'saved' : ''}" data-save="${item.word}">${isSaved ? '已收' : '收藏'}</button>
        </div>
      </article>
    `;
  }).join('');

  container.querySelectorAll('[data-copy]').forEach(button => {
    button.addEventListener('click', () => copyText(button.dataset.copy));
  });
  container.querySelectorAll('[data-save]').forEach(button => {
    button.addEventListener('click', () => toggleSave(button.dataset.save));
  });
}

async function copyText(value) {
  try {
    await navigator.clipboard.writeText(value);
  } catch (_) {
    const textarea = document.createElement('textarea');
    textarea.value = value;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
  }
  showToast(`已复制 ${value}`);
}

function copyAll() {
  if (!currentResults.length) return showToast('没有可复制的候选');
  copyText(currentResults.map(item => `MB${item.word}`).join('\n'));
}

function toggleSave(word) {
  if (saved.includes(word)) {
    saved = saved.filter(item => item !== word);
  } else {
    saved.push(word);
  }
  localStorage.setItem('mb-saved', JSON.stringify(saved));
  renderResults();
  renderSaved();
  renderStats(getKeywords());
}

function renderSaved() {
  const grid = document.getElementById('savedGrid');
  if (!saved.length) {
    grid.innerHTML = '<span class="hint">还没有收藏候选。</span>';
  } else {
    grid.innerHTML = saved.map(word => `
      <span class="saved-chip">
        MB${word}
        <button data-remove="${word}" aria-label="移除">x</button>
      </span>
    `).join('');
    grid.querySelectorAll('[data-remove]').forEach(button => {
      button.addEventListener('click', () => {
        saved = saved.filter(item => item !== button.dataset.remove);
        localStorage.setItem('mb-saved', JSON.stringify(saved));
        renderSaved();
        renderResults();
        renderStats(getKeywords());
      });
    });
  }
  document.getElementById('savedCount').textContent = saved.length;
}

function renderStats(keywords = []) {
  document.getElementById('poolSize').textContent = poolReady ? candidatePool.length.toLocaleString() : '加载中';
  document.getElementById('excludedCount').textContent = (suffixes.length - candidatePool.length).toLocaleString();
  document.getElementById('currentCount').textContent = currentResults.length;
  document.getElementById('totalCount').textContent = totalGenerated;
  document.getElementById('savedCount').textContent = saved.length;
  document.getElementById('selectedCount').textContent = `${selectedTags.size} 已选`;
  document.getElementById('modeNote').textContent = poolReady ? (keywords.length ? keywords.slice(0, 4).join(' · ') : '自由随机') : '加载中';
}

function setPoolControlsEnabled(enabled) {
  document.getElementById('generateBtn').disabled = !enabled;
  document.getElementById('againBtn').disabled = !enabled;
}

async function bootCandidatePool() {
  setPoolControlsEnabled(false);
  renderResults();
  renderStats();

  const loadUsedKeysTask = loadBakedUsedNameKeys();
  suffixes = await buildWordSet(progress => {
    const poolSize = document.getElementById('poolSize');
    poolSize.textContent = typeof progress === 'number' ? progress.toLocaleString() : progress;
  });
  await loadUsedKeysTask;
  refreshCandidatePool();
  poolReady = true;
  setPoolControlsEnabled(true);
  renderResults();
  renderStats(getKeywords());

  if (localUsedKeys.size) {
    showToast(`已按本地去重名单剔除 ${suffixes.length - candidatePool.length} 个`);
  }
}

function renderTags() {
  const group = document.getElementById('tagGroup');
  group.innerHTML = ALL_TAGS.map(tag => `<button class="tag" data-tag="${tag}">${tag}</button>`).join('');
  group.querySelectorAll('[data-tag]').forEach(button => {
    button.addEventListener('click', () => {
      const tag = button.dataset.tag;
      if (selectedTags.has(tag)) selectedTags.delete(tag);
      else selectedTags.add(tag);
      button.classList.toggle('active', selectedTags.has(tag));
      renderStats(getKeywords());
    });
  });
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => {
    toast.textContent = '';
  }, 1800);
}

function clearFilters() {
  selectedTags.clear();
  document.getElementById('customInput').value = '';
  document.getElementById('maxLength').value = 8;
  document.querySelectorAll('.tag.active').forEach(tag => tag.classList.remove('active'));
  renderStats([]);
}

document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('againBtn').addEventListener('click', generate);
document.getElementById('copyAllBtn').addEventListener('click', copyAll);
document.getElementById('clearBtn').addEventListener('click', clearFilters);
document.getElementById('clearSavedBtn').addEventListener('click', () => {
  saved = [];
  localStorage.removeItem('mb-saved');
  renderSaved();
  renderResults();
  renderStats(getKeywords());
});
document.getElementById('customInput').addEventListener('input', () => renderStats(getKeywords()));
document.getElementById('maxLength').addEventListener('input', () => renderStats(getKeywords()));
document.querySelectorAll('#countButtons button').forEach(button => {
  button.addEventListener('click', () => {
    generationCount = Number(button.dataset.count);
    document.querySelectorAll('#countButtons button').forEach(item => item.classList.remove('active'));
    button.classList.add('active');
  });
});

renderTags();
renderSaved();
renderStats();
setTimeout(bootCandidatePool, 0);
</script>
</body>
</html>
